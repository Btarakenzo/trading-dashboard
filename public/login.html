<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | KenzProject</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #222536;
      --border: #2a2d3e; --text: #e2e8f0; --text-muted: #64748b;
      --accent: #6366f1; --accent-hover: #4f52d8; --red: #ef4444; --green: #22c55e;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .login-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 2.5rem 2rem; width: 100%; max-width: 380px;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }
    .brand { text-align: center; margin-bottom: 2rem; }
    .brand-icon { font-size: 2.5rem; margin-bottom: .5rem; }
    .brand-name { font-size: 1.3rem; font-weight: 800; color: var(--accent); letter-spacing: .5px; }
    .brand-sub { font-size: .75rem; color: var(--text-muted); margin-top: .25rem; }
    .field { display: flex; flex-direction: column; gap: .4rem; margin-bottom: 1rem; }
    .field label { font-size: .75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
    .field input {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); padding: .65rem .9rem; font-size: .9rem; outline: none;
      transition: border-color .15s; width: 100%;
    }
    .field input:focus { border-color: var(--accent); }
    .btn-login {
      width: 100%; padding: .75rem; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: .9rem; font-weight: 700;
      cursor: pointer; transition: background .15s, transform .1s; margin-top: .5rem;
    }
    .btn-login:hover { background: var(--accent-hover); }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }
    .error-msg {
      background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
      border-radius: 6px; color: var(--red); font-size: .78rem; font-weight: 600;
      padding: .55rem .8rem; margin-bottom: 1rem; display: none;
    }
    .footer { text-align: center; margin-top: 2rem; font-size: .68rem; color: var(--text-muted); }
    .footer span { color: var(--accent); font-weight: 700; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="brand">
    <div class="brand-icon">📈</div>
    <div class="brand-name">KenzProject</div>
    <div class="brand-sub">BEI Trading Dashboard</div>
  </div>
  <div class="error-msg" id="errMsg"></div>
  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Masukkan username" autocomplete="username" autofocus>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password">
  </div>
  <button class="btn-login" id="loginBtn" onclick="doLogin()">Masuk</button>
  <div class="footer">Hak akses diatur oleh <span>KenzProject</span></div>
</div>
<script>
document.addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });

async function doLogin(){
  var username=document.getElementById('username').value.trim();
  var password=document.getElementById('password').value;
  var btn=document.getElementById('loginBtn');
  var err=document.getElementById('errMsg');
  if(!username||!password){ showErr('Username dan password wajib diisi.'); return; }
  btn.disabled=true; btn.textContent='Memproses...'; err.style.display='none';
  try {
    var res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    var data=await res.json();
    if(!res.ok){ showErr(data.error||'Login gagal.'); return; }
    if(data.role==='developer') location.href='/developer';
    else if(data.role==='admin') location.href='/admin';
    else location.href='/';
  } catch(e){ showErr('Tidak dapat terhubung ke server.'); }
  finally { btn.disabled=false; btn.textContent='Masuk'; }
}

function showErr(msg){
  var el=document.getElementById('errMsg');
  el.textContent=msg; el.style.display='block';
}
</script>
</body>
</html>
